<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; padding:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#f5f5f5; color:#333; }
.container { max-width:600px; margin:0 auto; background:#fff; }
.header { background:#6366f1; padding:24px; text-align:center; }
.header h1 { color:#fff; margin:0; font-size:24px; }
.body { padding:32px 24px; }
.body h2 { margin-top:0; color:#1f2937; }
.body p { line-height:1.6; color:#4b5563; }
.btn { display:inline-block; padding:12px 32px; background:#6366f1; color:#fff !important; text-decoration:none; border-radius:8px; font-weight:600; margin:16px 0; }
.footer { padding:24px; text-align:center; font-size:12px; color:#9ca3af; border-top:1px solid #e5e7eb; }
.footer a { color:#6366f1; }
@media (prefers-color-scheme:dark) {
  body { background:#1f2937; }
  .container { background:#111827; }
  .body h2 { color:#f9fafb; }
  .body p { color:#d1d5db; }
  .footer { border-color:#374151; color:#6b7280; }
}
</style>
</head>
<body>
<div class="container">
  <div class="header"><h1>YourPage</h1></div>
  <div class="body">{{block "content" .}}{{end}}</div>
  <div class="footer">
    <p>&copy; 2026 YourPage. Platform Monetisasi Konten untuk Kreator Indonesia.</p>
    <p><a href="{{.FrontendURL}}">yourpage.id</a></p>
  </div>
</div>
</body>
</html>
