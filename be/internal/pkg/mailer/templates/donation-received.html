{{define "content"}}
<h2>Donasi Diterima! ☕</h2>
<p>Hai {{.CreatorName}},</p>
<p><strong>{{.DonorName}}</strong> mengirim donasi <strong>{{.Credits}} Credit</strong> untukmu.</p>

<a href="{{.FrontendURL}}/dashboard" class="btn">Lihat di Dashboard</a>
{{end}}
