services:
  # ─── Infrastructure ───────────────────────────────────────────
  postgres:
    image: postgres:15
    pull_policy: missing
    environment:
      POSTGRES_DB: yourpage
      POSTGRES_USER: yourpage
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devsecret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yourpage"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    pull_policy: missing
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    pull_policy: missing
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
    ports:
      - "9002:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    pull_policy: missing
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_USER:-minioadmin} $${MINIO_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/public-media;
      mc mb --ignore-existing local/private-media;
      mc anonymous set public local/public-media;
      echo 'MinIO buckets ready';
      "
    restart: "no"

  # ─── Database Migration ───────────────────────────────────────
  migrate:
    build:
      context: ./be
      dockerfile: Dockerfile.dev
    command: ["go", "run", "./cmd/migrate/main.go", "up"]
    environment:
      DATABASE_URL: postgres://yourpage:${DB_PASSWORD:-devsecret}@postgres:5432/yourpage?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ─── Backend API ──────────────────────────────────────────────
  be:
    build:
      context: ./be
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    environment:
      APP_ENV: development
      APP_PORT: "8080"
      DATABASE_URL: postgres://yourpage:${DB_PASSWORD:-devsecret}@postgres:5432/yourpage?sslmode=disable
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_ENDPOINT: localhost:9002
      MINIO_ACCESS_KEY: ${MINIO_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD:-minioadmin}
      MINIO_USE_SSL: "false"
      MINIO_PUBLIC_BUCKET: public-media
      MINIO_PRIVATE_BUCKET: private-media
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-do-not-use-in-prod}
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 168h
      XENDIT_SECRET_KEY: ""
      XENDIT_WEBHOOK_TOKEN: ""
      PAYPAL_CLIENT_ID: ""
      PAYPAL_CLIENT_SECRET: ""
      PAYPAL_MODE: sandbox
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      SMTP_FROM: "${SMTP_FROM:-}"
      PLATFORM_FEE_PERCENT: "10"
      MIN_WITHDRAWAL_IDR: "100000"
      CREDIT_RATE_IDR: "1000"
      MAX_UPLOAD_SIZE_MB: "500"
      FRONTEND_URL: http://localhost:3000
      ADMIN_EMAIL: "nandolimwork+admin@gmail.com"
      ADMIN_PASSWORD: "Admin@YourPage2026!"
      FINANCE_EMAIL: "${FINANCE_EMAIL:-nandolimwork+finance@gmail.com}"
      FINANCE_PASSWORD: "${FINANCE_PASSWORD:-6ca954aa55471ad2}"
    volumes:
      - ./be:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  # ─── Frontend ─────────────────────────────────────────────────
  fe:
    build:
      context: ./fe
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: /api/v1
      NODE_ENV: development
    volumes:
      - ./fe:/app
      - /app/node_modules
    tmpfs:
      - /app/.next
    depends_on:
      - be
    restart: unless-stopped

  # ─── Gateway ──────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - be
      - fe
    restart: unless-stopped

  # ─── Monitoring ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    pull_policy: missing
    profiles: ["monitoring"]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    depends_on:
      - be
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    pull_policy: missing
    profiles: ["monitoring"]
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:
