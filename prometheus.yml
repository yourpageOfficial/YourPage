global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert.rules.yml

scrape_configs:
  - job_name: "yourpage-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["be:8080"]
    # Internal header so metrics endpoint allows access
    params: {}
