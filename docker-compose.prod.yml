# Production overrides — use: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  be:
    build:
      context: ./be
      dockerfile: Dockerfile
    volumes: []
    environment:
      GIN_MODE: release

  fe:
    build:
      context: ./fe
      dockerfile: Dockerfile
    volumes: []
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: /api/v1
