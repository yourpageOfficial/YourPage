services:
  # ─── Database ────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-yourpage}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-yourpage}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-yourpage}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - miniodata:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/public-media;
      mc mb --ignore-existing local/private-media;
      mc anonymous set download local/public-media;
      exit 0;"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}

  # ─── Migration ───────────────────────────────────────────
  migrate:
    build:
      context: ./be
      dockerfile: Dockerfile.migrate
    environment:
      DATABASE_URL: postgres://${DB_USER:-yourpage}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-yourpage}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Backend ─────────────────────────────────────────────
  be:
    build:
      context: ./be
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://${DB_USER:-yourpage}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-yourpage}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD}
      MINIO_USE_SSL: "false"
      MINIO_PUBLIC_BUCKET: public-media
      MINIO_PRIVATE_BUCKET: private-media
      GIN_MODE: release
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@yourpage.id}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DOMAIN: ${DOMAIN:-_}
      PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  # ─── Frontend ────────────────────────────────────────────
  fe:
    build:
      context: ./fe
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: /api/v1
    depends_on:
      - be
    restart: unless-stopped

  # ─── Nginx Gateway ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      - be
      - fe
    restart: unless-stopped

  # ─── SSL (Certbot) ──────────────────────────────────────
  certbot:
    image: certbot/certbot
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  # ─── Monitoring ──────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
    volumes:
      - grafanadata:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  miniodata:
  promdata:
  grafanadata:
  certbot-webroot:
