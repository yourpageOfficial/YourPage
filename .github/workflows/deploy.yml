name: Deploy Production

on:
  push:
    tags: ['v*']

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd ~/YourPage
            git fetch --all --tags
            git checkout main
            git pull origin main
            sudo docker compose -f docker-compose.production.yml build --no-cache fe be
            sudo docker compose -f docker-compose.production.yml up -d
            sudo docker image prune -f
            echo "✅ Deployed $(git describe --tags) at $(date)"
