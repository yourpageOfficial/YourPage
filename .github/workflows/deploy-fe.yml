name: Deploy FE

on:
  push:
    branches: [main]
    paths: ['fe/**']

jobs:
  deploy:
    name: Build & Deploy FE
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 8m
          script: |
            set -e
            cd ~/YourPage
            git pull origin main
            sudo docker compose -f docker-compose.production.yml build fe
            sudo docker compose -f docker-compose.production.yml up -d fe
            sudo docker image prune -f
            echo "✅ FE deployed at $(date)"
